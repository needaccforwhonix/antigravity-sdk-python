<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .node { cursor: pointer; transition: transform 0.3s ease; }
      .node:hover { transform: scale(1.05); }
      .text-title { font-family: 'Inter', system-ui, sans-serif; font-weight: bold; fill: #F3F4F6; }
      .text-desc { font-family: 'Inter', system-ui, sans-serif; fill: #9CA3AF; font-size: 14px; }
      .db-box { fill: #1F2937; stroke: #374151; stroke-width: 2; rx: 8; }
      .link-line { stroke: #4B5563; stroke-width: 2; stroke-dasharray: 8 4; animation: flow 10s linear infinite; }
      @keyframes flow {
        to { stroke-dashoffset: -100; }
      }
      .pulse-circle { animation: pulse 2s infinite; }
      @keyframes pulse {
        0% { r: 6; opacity: 1; }
        100% { r: 20; opacity: 0; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0B0F19" rx="16" />

  <!-- Title -->
  <text x="40" y="50" class="text-title" font-size="24">Interactive GraphRAG Telemetry Swarm Architecture</text>
  <text x="40" y="80" class="text-desc">Click on any subsystem node to inspect its internal role in ADK 2.0</text>

  <!-- Flow Lines -->
  <line x1="180" y1="260" x2="350" y2="260" class="link-line" />
  <line x1="450" y1="260" x2="620" y2="180" class="link-line" />
  <line x1="450" y1="260" x2="620" y2="260" class="link-line" />
  <line x1="450" y1="260" x2="620" y2="340" class="link-line" />

  <!-- Node 1: Swarm Collector -->
  <g class="node" id="node-collector" onclick="showInfo('collector')">
    <rect x="50" y="210" width="130" height="100" class="db-box" stroke="#3B82F6" />
    <circle cx="115" cy="245" r="8" fill="#3B82F6" />
    <circle cx="115" cy="245" r="8" fill="#3B82F6" class="pulse-circle" />
    <text x="115" y="280" font-family="Inter" font-weight="bold" fill="#3B82F6" font-size="14" text-anchor="middle">Aegis Swarm</text>
  </g>

  <!-- Node 2: Apache Arrow Flight RPC -->
  <g class="node" id="node-arrow" onclick="showInfo('arrow')">
    <rect x="320" y="210" width="130" height="100" class="db-box" stroke="#10B981" />
    <text x="385" y="255" font-family="Inter" font-weight="bold" fill="#10B981" font-size="14" text-anchor="middle">Arrow Flight</text>
    <text x="385" y="275" font-family="Inter" fill="#6B7280" font-size="12" text-anchor="middle">Zero-Copy RPC</text>
  </g>

  <!-- Node 3: Memgraph (Hot Path) -->
  <g class="node" id="node-memgraph" onclick="showInfo('memgraph')">
    <rect x="620" y="130" width="130" height="80" class="db-box" stroke="#EC4899" />
    <text x="685" y="175" font-family="Inter" font-weight="bold" fill="#EC4899" font-size="13" text-anchor="middle">Memgraph</text>
  </g>

  <!-- Node 4: Neo4j (Cold Path) -->
  <g class="node" id="node-neo4j" onclick="showInfo('neo4j')">
    <rect x="620" y="220" width="130" height="80" class="db-box" stroke="#F59E0B" />
    <text x="685" y="265" font-family="Inter" font-weight="bold" fill="#F59E0B" font-size="13" text-anchor="middle">Neo4j Graph</text>
  </g>

  <!-- Node 5: Weavinate (Vector Space) -->
  <g class="node" id="node-weavinate" onclick="showInfo('weavinate')">
    <rect x="620" y="310" width="130" height="80" class="db-box" stroke="#8B5CF6" />
    <text x="685" y="355" font-family="Inter" font-weight="bold" fill="#8B5CF6" font-size="13" text-anchor="middle">Weavinate</text>
  </g>

  <!-- Info Display Panel -->
  <rect x="40" y="400" width="720" height="80" fill="#111827" stroke="#374151" stroke-width="1" rx="8" />
  <text x="60" y="430" id="info-title" font-family="Inter" font-weight="bold" fill="#F3F4F6" font-size="16">System Info</text>
  <text x="60" y="455" id="info-desc" font-family="Inter" fill="#9CA3AF" font-size="14">Select an architectural node to check details.</text>

  <script type="text/javascript">
    <![CDATA[
    var details = {
      collector: {
        title: "Aegis Swarm collector",
        desc: "Aggregates localized trajectory and telemetry streams directly from ADK 2.0 clients."
      },
      arrow: {
        title: "Apache Arrow Flight RPC Server",
        desc: "Deserializes binary network buffers using zero-copy processes, avoiding JSON parsing overhead."
      },
      memgraph: {
        title: "Memgraph (In-Memory Hot Path)",
        desc: "Constructs real-time transactional Cypher routing tables for instantaneous swarm topology changes."
      },
      neo4j: {
        title: "Neo4j Graph Database (Cold Storage)",
        desc: "Provides structured long-term index memory for complex multi-agent reasoning tasks."
      },
      weavinate: {
        title: "Weavinate / Qdrant Vector Engine",
        desc: "Indexes semantic embedding coordinates to enable fast similarity and RAG searches."
      }
    };

    function showInfo(nodeId) {
      var data = details[nodeId];
      if (data) {
        document.getElementById('info-title').textContent = data.title;
        document.getElementById('info-desc').textContent = data.desc;
      }
    }
    ]]>
  </script>
</svg>
