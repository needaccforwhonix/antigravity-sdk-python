<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background-color: #0d1117; font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif; border-radius: 16px; user-select: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#30363d" stroke-width="1" opacity="0.3"/>
    </pattern>
    
    <!-- Neon Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#1f6feb" />
    </linearGradient>
    
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bc8cff" />
      <stop offset="100%" stop-color="#8957e5" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56d364" />
      <stop offset="100%" stop-color="#2ea043" />
    </linearGradient>

    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b72" />
      <stop offset="100%" stop-color="#da3633" />
    </linearGradient>

    <!-- Drop shadows -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* Continuous animations */
    @keyframes pulseGlow {
      0% { opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { opacity: 0.3; }
    }
    @keyframes dashStream {
      to { stroke-dashoffset: -40; }
    }
    @keyframes floatRobot {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    @keyframes rotateRadar {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Class applications */
    .grid-bg { fill: url(#grid); }
    .floating-1 { animation: floatRobot 4s ease-in-out infinite; transform-origin: center; }
    .floating-2 { animation: floatRobot 5s ease-in-out infinite; transform-origin: center; }
    .floating-3 { animation: floatRobot 4.5s ease-in-out infinite; transform-origin: center; }
    .stream-line { stroke-dasharray: 8, 8; animation: dashStream 2s linear infinite; }
    .radar-spin { animation: rotateRadar 15s linear infinite; transform-origin: 400px 220px; }
    
    /* Interactive states */
    .clickable { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .clickable:hover { filter: brightness(1.2) drop-shadow(0 0 10px rgba(88,166,255,0.4)); }
    .node-label { font-size: 13px; font-weight: bold; fill: #adbac7; text-anchor: middle; }
    
    /* UI States (Dynamic visibility) */
    .state-collision .collision-only { display: block; }
    .state-collision .lease-only { display: none; }
    .state-lease .collision-only { display: none; }
    .state-lease .lease-only { display: block; }
  </style>

  <!-- Background blueprint -->
  <rect width="100%" height="100%" fill="#0d1117" />
  <rect width="100%" height="100%" class="grid-bg" />

  <!-- Radar sweep in background representing vector search -->
  <circle cx="400" cy="220" r="160" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.15" />
  <circle cx="400" cy="220" r="100" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.1" />
  <line x1="400" y1="220" x2="400" y2="60" class="radar-spin" stroke="#58a6ff" stroke-width="2" opacity="0.3" filter="url(#glow)" />

  <!-- Network connection lines (streams) -->
  <g id="connections">
    <!-- Path 1 (Blue to Gate) -->
    <path d="M 210 180 Q 300 185 360 215" fill="none" stroke="#58a6ff" stroke-width="3" class="stream-line" />
    <!-- Path 2 (Green to Gate) -->
    <path d="M 590 180 Q 500 185 440 215" fill="none" stroke="#56d364" stroke-width="3" class="stream-line" />
    <!-- Path 3 (Purple/Swarm base link) -->
    <path d="M 400 370 L 400 280" fill="none" stroke="#bc8cff" stroke-width="3" class="stream-line" />
  </g>

  <!-- CENTRAL GATE (The Problem: Conflict vs Lease) -->
  <g id="gate" class="clickable state-collision" onclick="toggleGateState()">
    <!-- Port ring -->
    <circle cx="400" cy="220" r="50" fill="#161b22" stroke="#30363d" stroke-width="4" />
    
    <!-- State 0: Collision (Red Alarm) -->
    <g class="collision-only">
      <circle cx="400" cy="220" r="42" fill="none" stroke="#ff7b72" stroke-width="3" opacity="0.8" filter="url(#glow)" />
      <!-- Danger icon (Flash) -->
      <path d="M 400 200 L 388 220 L 398 220 L 396 238 L 412 216 L 402 216 Z" fill="#ff7b72" filter="url(#glow)" />
      <circle cx="400" cy="220" r="48" fill="none" stroke="#ff7b72" stroke-width="1" opacity="0.5">
        <animate attributeName="r" values="42;65;42" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- State 1: Leased Port (Green Lock) -->
    <g class="lease-only">
      <circle cx="400" cy="220" r="42" fill="none" stroke="#56d364" stroke-width="3" opacity="0.8" filter="url(#glow)" />
      <!-- Padlock icon -->
      <rect x="388" y="212" width="24" height="18" rx="3" fill="#56d364" filter="url(#glow)" />
      <path d="M 393 212 L 393 205 A 7 7 0 0 1 407 205 L 407 212" fill="none" stroke="#56d364" stroke-width="3" stroke-linecap="round" filter="url(#glow)" />
    </g>
    
    <text x="400" y="295" font-size="12" font-weight="bold" fill="#ff7b72" text-anchor="middle" class="collision-only" filter="url(#glow)">COLLISION! 🛑</text>
    <text x="400" y="295" font-size="12" font-weight="bold" fill="#56d364" text-anchor="middle" class="lease-only" filter="url(#glow)">LEASE OK 🟢</text>
    <text x="400" y="312" font-size="10" fill="#8b949e" text-anchor="middle">(Hier klicken zum Umschalten)</text>
  </g>

  <!-- ROBOT 1: Blue (Thinker - Vektor-Erzeuger) -->
  <g id="robot-blue" class="clickable floating-1" onclick="showExplanation('blue')">
    <!-- Position offset to match center 210,180 -->
    <g transform="translate(150, 120)">
      <!-- Antennas -->
      <line x1="60" y1="20" x2="60" y2="40" stroke="#58a6ff" stroke-width="3"/>
      <circle cx="60" cy="20" r="5" fill="#58a6ff" filter="url(#glow)"/>
      <!-- Body -->
      <rect x="30" y="40" width="60" height="50" rx="8" fill="url(#blueGrad)" stroke="#30363d" stroke-width="2"/>
      <!-- Screen -->
      <rect x="40" y="48" width="40" height="24" rx="4" fill="#0d1117" stroke="#58a6ff" stroke-width="1"/>
      <!-- Happy eyes -->
      <ellipse cx="50" cy="60" rx="4" ry="2" fill="#58a6ff" filter="url(#glow)"/>
      <ellipse cx="70" cy="60" rx="4" ry="2" fill="#58a6ff" filter="url(#glow)"/>
      <!-- Hands -->
      <circle cx="20" cy="65" r="6" fill="#1f6feb"/>
      <circle cx="100" cy="65" r="6" fill="#1f6feb"/>
      <!-- Labels -->
      <text x="60" y="110" class="node-label">Agent Blue 🧠</text>
    </g>
  </g>

  <!-- ROBOT 2: Green (Builder - WASM & local APIs) -->
  <g id="robot-green" class="clickable floating-2" onclick="showExplanation('green')">
    <!-- Position offset to match center 590,180 -->
    <g transform="translate(530, 120)">
      <!-- Antenna -->
      <line x1="60" y1="20" x2="60" y2="40" stroke="#56d364" stroke-width="3"/>
      <polygon points="60,15 54,25 66,25" fill="#56d364" filter="url(#glow)"/>
      <!-- Body -->
      <rect x="30" y="40" width="60" height="50" rx="12" fill="url(#greenGrad)" stroke="#30363d" stroke-width="2"/>
      <!-- Screen -->
      <rect x="40" y="48" width="40" height="24" rx="4" fill="#0d1117" stroke="#56d364" stroke-width="1"/>
      <!-- Happy eyes -->
      <circle cx="50" cy="60" r="4" fill="#56d364" filter="url(#glow)"/>
      <circle cx="70" cy="60" r="4" fill="#56d364" filter="url(#glow)"/>
      <path d="M 54 66 Q 60 72 66 66" fill="none" stroke="#56d364" stroke-width="2" filter="url(#glow)"/>
      <!-- Hands -->
      <path d="M 22 55 L 30 65 L 22 75" fill="none" stroke="#56d364" stroke-width="3" stroke-linecap="round"/>
      <path d="M 98 55 L 90 65 L 98 75" fill="none" stroke="#56d364" stroke-width="3" stroke-linecap="round"/>
      <!-- Labels -->
      <text x="60" y="110" class="node-label">Agent Green 🛠️</text>
    </g>
  </g>

  <!-- ROBOT 3: Purple (NATS Swarm Swarm coordinator) -->
  <g id="robot-purple" class="clickable floating-3" onclick="showExplanation('purple')">
    <!-- Position offset to match center 400,370 -->
    <g transform="translate(340, 370)">
      <!-- Double ears/Antennas -->
      <path d="M 45 40 Q 30 25 35 15" fill="none" stroke="#bc8cff" stroke-width="3" />
      <path d="M 75 40 Q 90 25 85 15" fill="none" stroke="#bc8cff" stroke-width="3" />
      <!-- Body -->
      <rect x="30" y="40" width="60" height="50" rx="20" fill="url(#purpleGrad)" stroke="#30363d" stroke-width="2"/>
      <!-- Screen -->
      <rect x="42" y="52" width="36" height="20" rx="8" fill="#0d1117" stroke="#bc8cff" stroke-width="1"/>
      <!-- Cyclops / Digital Eye -->
      <circle cx="60" cy="62" r="5" fill="#bc8cff" filter="url(#glow)"/>
      <!-- Wheels / Legs -->
      <ellipse cx="45" cy="94" rx="8" ry="4" fill="#8957e5"/>
      <ellipse cx="75" cy="94" rx="8" ry="4" fill="#8957e5"/>
      <!-- Labels -->
      <text x="60" y="120" class="node-label">Swarm Link 📡</text>
    </g>
  </g>

  <!-- BOTTOM ELI5 EXPLANATION BOARD -->
  <g transform="translate(40, 500)">
    <!-- Border card -->
    <rect x="0" y="0" width="720" height="80" rx="10" fill="#161b22" stroke="#30363d" stroke-width="2" />
    
    <!-- Title indicator -->
    <text x="20" y="30" font-size="14" font-weight="bold" fill="#58a6ff" id="info-title">ELI5-Erklärung: Das Problem</text>
    <!-- Text body -->
    <text x="20" y="55" font-size="12" fill="#adbac7" id="info-text">Roboter wollen zeitgleich durch dasselbe Tor rennen! Klicke die Roboter oder das Tor an, um die Lösung zu sehen.</text>
  </g>

  <script type="text/javascript">
    <![CDATA[
    var currentExplanation = 'default';

    function toggleGateState() {
      var gate = document.getElementById('gate');
      var title = document.getElementById('info-title');
      var text = document.getElementById('info-text');

      if (gate.classList.contains('state-collision')) {
        gate.classList.remove('state-collision');
        gate.classList.add('state-lease');
        title.textContent = '🔑 Die Lösung: Port-Leasing (Miet-Schlüssel)';
        title.setAttribute('fill', '#56d364');
        text.textContent = 'Mit dem Python-SDK mietet sich Agent Blue den Port exklusiv (wie eine Reservierung). Agent Green wartet brav, bis er an der Reihe ist.';
      } else {
        gate.classList.remove('state-lease');
        gate.classList.add('state-collision');
        title.textContent = '💥 Das Problem: Port-Collision (Zusammenstoß)';
        title.setAttribute('fill', '#ff7b72');
        text.textContent = 'Ohne Regeln rennen beide Roboter gleichzeitig durch das Tor (denselben Port). Es knallt, und die Verbindung bricht ab!';
      }
    }

    function showExplanation(agent) {
      var title = document.getElementById('info-title');
      var text = document.getElementById('info-text');

      if (agent === 'blue') {
        title.textContent = '🧠 Agent Blue (Vektor-Schlau-Kopf)';
        title.setAttribute('fill', '#58a6ff');
        text.textContent = 'Er überlegt sich schlaue Vektoren (Ideen) und sucht im System nach Ähnlichkeiten. Er fragt das Port-Lease an, bevor er sendet.';
      } else if (agent === 'green') {
        title.textContent = '🛠️ Agent Green (WebAssembly-Bauer)';
        title.setAttribute('fill', '#56d364');
        text.textContent = 'Er führt Programme direkt im schnellen WebAssembly-Modus (Wasmtime/Wazero) aus, ohne den Computer mit Unterprozessen zu belasten.';
      } else if (agent === 'purple') {
        title.textContent = '📡 Swarm Coordinator (Der Funker)';
        title.setAttribute('fill', '#bc8cff');
        text.textContent = 'Er koordiniert alle Roboter über das NATS-Funksystem (Event Bus) und meldet sofort, wenn ein neuer Evolve-Befehl auszuführen ist.';
      }
    }
    ]]>
  </script>
</svg>
